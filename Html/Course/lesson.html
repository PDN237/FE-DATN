<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học - Learning Platform</title>
    
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/FrondEnd/Style/Lesson.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <div class="logo">COURSES</div>
                <span class="separator">/</span>
                <span class="course-name">Loading Course...</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='../Course/course.html'">Quay lại</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Nội dung khóa học</h2>
                <p>Loading...</p>
            </div>
            <div id="modulesList"></div>
        </aside>

        <!-- Content Area -->
        <main class="content-area">
            <!-- Loading Indicator (Hidden initially, handled by JS) -->
            <div id="loadingIndicator" class="hidden" style="text-align: center; padding: 40px; color: var(--text-muted);">
                Đang tải dữ liệu...
            </div>

            <!-- Video/Media Section -->
            <div id="videoSection" class="video-section">
                <div class="video-container">
                    <div class="video-player" onclick="togglePlay()">
                        <div class="video-placeholder">
                            <div class="play-button">
                                <svg class="play-icon" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                            </div>
                            <p style="font-size: 16px; font-weight: 500;">Chưa có nội dung</p>
                        </div>
                        <!-- Video Controls will go here or be hidden for iframes -->
                    </div>
                    <div class="lesson-header">
                        <h1 id="lessonTitle">Loading Lesson...</h1>
                        <p class="lesson-description" id="lessonDescription"></p>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('describe')">Mô tả chi tiết</button>
                    <button class="tab-btn" onclick="switchTab('summary')">Tóm tắt nội dung</button>
                    <button class="tab-btn" onclick="switchTab('quiz')">Câu hỏi ôn tập</button>
                </div>
            </div>

            <!-- Tab Content -->
            <div class="tab-content">
                <div id="describeTab" class="tab-panel active">
                    <h2>Mô tả chi tiết</h2>
                    <div id="describeContent" class="reading-content" style="white-space: pre-wrap; line-height: 1.8;"></div>
                </div>

                <div id="summaryTab" class="tab-panel">
                    <h2>Tóm tắt nội dung</h2>
                    <div id="summaryContent" class="reading-content" style="white-space: pre-wrap; line-height: 1.8;"></div>
                </div>
                
                <div id="quizTab" class="tab-panel">
                    <!-- Quiz Section -->
                    <div id="quizSection" class="quiz-container">
                        <div class="quiz-content">
                            <div id="quizMain">
                                <div class="quiz-header">
                                    <div class="quiz-title-row">
                                        <h2 class="quiz-title">Bài kiểm tra</h2>
                                        <span class="quiz-progress-text" id="quizProgress">Câu 1/5</span>
                                    </div>
                                    <div class="quiz-progress-bar">
                                        <div class="quiz-progress-fill" id="quizProgressBar" style="width: 20%"></div>
                                    </div>
                                </div>

                                <div class="question-card">
                                    <div class="question-text" id="questionText"></div>
                                    <div class="options" id="optionsContainer"></div>
                                    <div id="explanationContainer" class="hidden"></div>
                                </div>

                                <div class="quiz-nav">
                                    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                                        Câu trước
                                    </button>
                                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">
                                        Câu tiếp theo
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                                    </button>
                                </div>
                            </div>

                            <div id="resultsSection" class="results-container hidden">
                                <div class="results-card modal-pop">
                                    <div id="completionBadge" class="completion-badge hidden">
                                        <span id="completionBadgeText"></span>
                                    </div>
                                    <h2 class="results-title">Kết quả bài kiểm tra</h2>
                                    <div class="score-circle">
                                        <svg width="192" height="192">
                                            <circle cx="96" cy="96" r="88" stroke="var(--border)" stroke-width="14" fill="none" />
                                            <circle id="scoreCircle" cx="96" cy="96" r="88" stroke="var(--primary)" stroke-width="14" fill="none" style="transform: rotate(-90deg); transform-origin: center; stroke-dasharray: 553; stroke-dashoffset: 414; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;" stroke-linecap="round" />
                                        </svg>
                                        <div class="score-number" id="scoreNumber">0/5</div>
                                    </div>
                                    <div style="margin-top: -16px; margin-bottom: 24px;">
                                        <p class="score-label" style="color: var(--text-muted); font-size: 16px; font-weight: 500;">câu đúng</p>
                                    </div>
                                    <p class="score-percentage" id="scorePercentage">Điểm số: 0%</p>
                                    <p class="score-message" id="scoreMessage"></p>
                                </div>

                                <div class="review-section">
                                    <h3 class="review-title">Chi tiết các câu hỏi</h3>
                                    <div id="reviewContent"></div>
                                </div>

                                <button class="btn btn-primary" onclick="retryQuiz()" style="display: flex; margin: 32px auto 0;">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                    </svg>
                                    Làm lại bài kiểm tra
                                </button>
                            </div>
                        </div>
                    </div>
                </div> <!-- end quizTab -->
            </div> <!-- end tab-content -->
        </main>
    </div>

    <script src="lms-config.js"></script>
    <script src="lesson.js"></script>
</body>

</html>
