<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DATN Group 66</title>
    <link rel="stylesheet" href="../../Style/Account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="login-image">
                <div class="circle-bg">
                    <svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="90" cy="90" r="80" fill="rgba(155, 89, 182, 0.3)"/>
                        <path d="M90 30C60 30 40 50 40 80C40 110 60 130 90 130C120 130 140 110 140 80C140 50 120 30 90 30Z" fill="#a29bfe"/>
                        <text x="90" y="90" text-anchor="middle" dy=".3em" font-size="36" font-weight="bold" fill="#2ecc71">AI</text>
                    </svg>
                </div>
            </div>
            <div class="login-form">
                <h2>REGISTER</h2>
<form id="registerForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="regPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword')"></i>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="confirmPassword" id="regConfirmPassword" placeholder="Confirm Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regConfirmPassword')"></i>
                    </div>
                    <button type="submit" class="btn-login">CREATE ACCOUNT</button>
                </form>
                
                <div class="social-login">
                    <p>Or sign up with</p>
                    <div class="social-icons">
                        <a href="#" class="icon google"><i class="fab fa-google"></i></a>
                        <a href="#" class="icon facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="icon twitter"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
                
                <div class="create-account">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i>Already have account? Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Client-side validation
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            if (password !== confirmPassword) {
                alert('Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (password.length < 6) {
                alert('Mật khẩu phải từ 6 ký tự trở lên!');
                return;
            }
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('https://be-datn-6gb6.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: data.username,
                        email: data.email,
                        password: data.password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(result.message);
                    window.location.href = 'login.html';
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Lỗi kết nối server');
            }
        });
    </script>
</body>
</html>
