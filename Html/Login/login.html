<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Teen Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Style/Account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-left">
                <div class="brand-section">
                    <div class="logo">
                        <div class="logo-icon">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <h1>Teen Lab</h1>
                    </div>
                    <p class="tagline">Nắm vững thuật toán qua học tập tương tác</p>
                    <div class="illustration">
                        <div class="chart-bars">
                            <div class="bar" style="height: 60%;"></div>
                            <div class="bar" style="height: 80%;"></div>
                            <div class="bar" style="height: 45%;"></div>
                            <div class="bar" style="height: 90%;"></div>
                            <div class="bar" style="height: 70%;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="auth-right">
                <div class="form-container">
                    <div class="form-header">
                        <h2>Chào mừng trở lại!</h2>
                        <p>Đăng nhập để tiếp tục hành trình học tập của bạn</p>
                    </div>

                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Mật khẩu</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu của bạn" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" name="remember">
                                <span class="checkmark"></span>
                                Ghi nhớ đăng nhập
                            </label>
                            <a href="#" class="forgot-link">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span>Đăng nhập</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="divider">
                        <span>hoặc tiếp tục với</span>
                    </div>

                    <div class="social-login">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Google
                        </button>
                        <button class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                            Facebook
                        </button>
                    </div>

                    <div class="form-footer">
                        <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="success-modal-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3>Đăng nhập thành công!</h3>
            <p>Chào mừng bạn quay trở lại Teen Lab</p>
            <button onclick="closeModalAndRedirect()">Tiếp tục</button>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.parentElement.querySelector('.toggle-password');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('active');
        }

        function closeModalAndRedirect() {
            const modal = document.getElementById('successModal');
            modal.classList.remove('active');
            
            // Add fade out animation before redirect
            document.body.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => {
                window.location.href = '../../Index.html';
            }, 500);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('https://be-datn-6gb6.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('userId', result.user.id);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showSuccessModal();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Lỗi kết nối máy chủ');
            }
        });
    </script>
</body>
</html>
