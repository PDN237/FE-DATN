<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng Xếp Hạng - Teen Lab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../Style/board.css" />
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="modern-header">
        <div class="header-container">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 4H21V6H3V4ZM9 11H21V13H9V11ZM3 18H21V20H3V18Z" fill="currentColor" />
                </svg>
                <span class="brand-name">Teen Lab</span>
                <span class="brand-badge">Pro</span>
            </div>

            <nav class="main-nav">
                <a href="../../Index.html" class="nav-link">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor" />
                    </svg>
                    Home
                </a>

                <a href="../../Html/Board/board.html" class="nav-link active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M16 6l2 2-4 4 4 4-2 2-6-6z"/>
                        <rect x="3" y="14" width="4" height="6"/>
                        <rect x="10" y="8" width="4" height="12"/>
                        <rect x="17" y="11" width="4" height="9"/>
                    </svg>
                    Bảng xếp hạng
                </a>
            </nav>

            <div class="header-actions">
                <button class="theme-toggle" title="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                            stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
                <div class="profile-dropdown">
                    <button class="profile-btn" id="profileBtn">
                        <img id="headerAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile" />
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <!-- Dropdown menu items will be dynamically populated by header.js -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ================= HERO SECTION ================= -->
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="gradient-text">Bảng Xếp Hạng</span>
            </h1>
            <p class="hero-description">
                Theo dõi thành tích chinh phục bảng xếp hạng thuật toán sắp xếp
            </p>
        </div>
    </section>

    <!-- ================= LEADERBOARD SECTION ================= -->
    <section class="leaderboard-section">
        <div class="container">

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-sort="score">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    Theo điểm
                </button>
                <button class="filter-tab" data-sort="problems">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 11 12 14 22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                    Theo bài tập
                </button>
                <button class="filter-tab" data-sort="courses">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Theo khóa học
                </button>
            </div>

            <!-- Top 3 Podium -->
            <div class="podium" id="podiumContainer">
                <!-- Podium will be loaded dynamically -->
            </div>

            <!-- Leaderboard Table -->
            <div class="leaderboard-table">
                <div class="table-header">
                    <h2>Toàn bộ xếp hạng</h2>
                </div>

                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>Hạng</th>
                            <th>Học viên</th>
                            <th>Danh hiệu</th>
                            <th>Điểm</th>
                            <th>Bài giải</th>
                            <th>Khóa học</th>
                        </tr>
                    </thead>
                    <tbody id="rankingTableBody">
                        <!-- Data will be loaded dynamically -->
                    </tbody>
                </table>
            </div>

        </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="modern-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <div class="brand">
                    <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M3 4H21V6H3V4ZM9 11H21V13H9V11ZM3 18H21V20H3V18Z" fill="currentColor" />
                    </svg>
                    <span class="brand-name">Teen Lab</span>
                </div>
                <p class="footer-tagline">Master algorithms through visualization</p>
            </div>
        </div>

        <div class="footer-bottom">
            <p>© 2026 Sorting Visualizer | Interactive Learning Platform</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../../Js/header.js"></script>
    <script src="Board.js"></script>

</body>

</html>
