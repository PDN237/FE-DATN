<html lang="en">
<head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/FrondEnd/Style/style.css" />
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header>
    <nav>
        <ul>
            <li><a href="./Index.html">Home</a></li>
            <li><a href="./Html/Tutor/index.html">Tutor</a></li>
            <li><a href="./Html/Course/course.html">Course</a></li>
            <li><a href="./Html/Practice/Problems.html">Practice</a></li>
            <li><a href="./Html/profile/profile.html">Profile</a></li>
            <li><a href="./Html/Login/login.html">Login</a></li>
            <li><a href="./Html/Admin/admin-dashboard.html">Admin</a></li>
        </ul>
    </nav>
</header>

<section class="hero-banner">
    <div class="hero-overlay">
        <div class="hero-content">
            <h1>Sorting Algorithm Visualizer</h1>
            <p>Interactive way to understand how sorting algorithms work</p>
        </div>
    </div>
</section>


<div class="app-container">

    <div class="top-section">
        <main id="mainContainer">
        </main>

        <!-- ===== SIDEBAR (RIGHT) ===== -->
        <aside class="sidebar">

            <div class="sidebar-header">
                <h2>Controls</h2>
            </div>

            <div class="controls">

                <div class="control-group">
                    <label for="numElements">Elements</label>
                    <input type="number" id="numElements" min="5" max="100" value="30" />
                </div>

                <div class="control-group">
                    <label for="sortType">Algorithm</label>
                    <select id="sortType">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="quick">Quick Sort</option>
                        <option value="merge">Merge Sort</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="speed">Speed</label>
                    <select id="speed">
                        <option value="0.25">0.25x</option>
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                        <option value="4">4x</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="visualizationMode">Visualization</label>
                    <select id="visualizationMode">
                        <option value="boxes" selected>Boxes</option>
                        <option value="bars">Bars</option>
                        <option value="sized-boxes">Sized Boxes</option>
                    </select>
                </div>

                <div class="button-group">
                    <button id="sortBtn">Sort</button>
                    <button id="randomizeBtn">Randomize</button>
                </div>

            </div>
        </aside>

    </div>

   
    <section id="algorithmDescription">
        <h2>Algorithm Description</h2>
        <p id="description"></p>

        <h3>Code Implementations</h3>
        <div id="codeSnippets"></div>

        <h3>Code Editor</h3>
        <div class="code-editor-container">
            <textarea id="codeEditor" placeholder="Write your sorting algorithm here..."></textarea>
        </div>
    </section>

</div>

<footer>
    <div class="footer-content">
        <p>© 2026 Sorting Visualizer | Interactive Learning Platform</p>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<script src="/FrondEnd/app.js"></script>
<script src="/FrondEnd/sort.js"></script>

</body>
</html>
